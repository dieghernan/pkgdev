name: checktor

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: checktor-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checktor:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install checktor
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            github::coatless-rpkg/checktor
          needs: check

      - name: Run checktor
        shell: Rscript {0}
        run: |
          results <- checktor::checktor()

          report <- checktor::health_report(
            results,
            format = "markdown"
          )

          writeLines(report, "checktor-report.md")

          if (!checktor::is_healthy(results)) {
            checktor::prescribe(results)
            stop("checktor found issues.", call. = FALSE)
          }

      - name: Upload checktor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checktor-report
          path: checktor-report.md
          if-no-files-found: warn
 